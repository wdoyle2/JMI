version: '3'

vars:
  APP_SERVICE: laravel.test
  # Sail is a bash script (macOS/Linux/WSL2). On native Windows, call Docker Compose directly —
  # `bash` on PATH is often WSL1, which cannot see Docker Desktop.
  COMPOSE: '{{if eq OS "windows"}}docker compose{{else}}./vendor/bin/sail{{end}}'
  ARTISAN: '{{if eq OS "windows"}}docker compose exec -T laravel.test php artisan{{else}}./vendor/bin/sail artisan{{end}}'
  PHP: '{{if eq OS "windows"}}docker compose exec -T laravel.test php{{else}}./vendor/bin/sail php{{end}}'

tasks:
  install-deps:
    desc: "Installs composer deps (via a one-shot docker container so you don't need PHP locally), creates .env, and generates APP_KEY."
    cmds:
      - |
        docker run --rm \
          -u "$(id -u):$(id -g)" \
          -v "$(pwd):/var/www/html" \
          -w /var/www/html \
          laravelsail/php83-composer:latest \
          composer install --ignore-platform-reqs --no-interaction --prefer-dist
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi
      - |
        if ! grep -q '^APP_KEY=base64:' .env; then
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$(pwd):/var/www/html" \
            -w /var/www/html \
            laravelsail/php83-composer:latest \
            php artisan key:generate --force
        fi

  build:
    desc: "Build the Sail app image."
    cmds:
      - '{{.COMPOSE}} build'

  up:
    desc: "Ups the local compose stack."
    cmds:
      - '{{.COMPOSE}} up {{.CLI_ARGS}}'

  down:
    desc: "Downs the local compose stack."
    cmds:
      - '{{.COMPOSE}} down'

  stop:
    desc: "Stops the local compose stack."
    cmds:
      - '{{.COMPOSE}} stop'

  logs:
    cmds:
      - '{{.COMPOSE}} logs -f {{.CLI_ARGS}}'

  bash:
    cmds:
      - '{{if eq OS "windows"}}docker compose exec {{.APP_SERVICE}} bash{{else}}./vendor/bin/sail shell{{end}}'

  artisan:
    desc: "Run an artisan command. Usage: task artisan -- migrate"
    cmds:
      - '{{.ARTISAN}} {{.CLI_ARGS}}'

  manage:
    desc: "Alias for artisan, to mirror Django taskfile UX."
    cmds:
      - '{{.ARTISAN}} {{.CLI_ARGS}}'

  migrate:
    cmds:
      - '{{.ARTISAN}} migrate'

  reset-db:
    desc: "Wipes all tables and re-migrates."
    cmds:
      - '{{.ARTISAN}} migrate:fresh --force'

  create_anemometers:
    desc: >
      Create a batch of random anemometers bundled with readings.
      Usage: task create_anemometers -- num_anemometers num_readings_per_anemometer num_tags_per_reading
    cmds:
      - '{{.ARTISAN}} w4l:create-anemometers {{.CLI_ARGS}}'

  init-data:
    desc: "Resets DB, loads initial user, seeds 50 anemometers × 100 readings × 2 tags."
    cmds:
      - task: reset-db
      - '{{.ARTISAN}} db:seed --class=InitialUserSeeder --force'
      - task: create_anemometers
        vars:
          CLI_ARGS: "50 100 2"

  init-app:
    desc: "Idempotent task building and starting the app from scratch."
    cmds:
      - task: build
      - task: up
        vars:
          CLI_ARGS: "-d --wait"
      - task: init-data

  tests:
    desc: "Migrate the wind4life_testing DB, then run the PHPUnit suite against it."
    cmds:
      - '{{.ARTISAN}} migrate --env=testing --force'
      - '{{.ARTISAN}} test {{.CLI_ARGS}}'

  phpcs:
    desc: "Check code style — PSR-12 with tabs (matches jmi/apps/core)."
    cmds:
      - '{{.PHP}} vendor/bin/phpcs --standard=phpcs.xml.dist app database routes tests {{.CLI_ARGS}}'

  phpcbf:
    desc: "Auto-fix code style — PSR-12 with tabs."
    cmds:
      - '{{.PHP}} vendor/bin/phpcbf --standard=phpcs.xml.dist app database routes tests {{.CLI_ARGS}}'
